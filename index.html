<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тестовая страница</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      max-width: 520px;
      width: calc(100% - 32px);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 12px;
    }

    p {
      margin: 0 0 20px;
      line-height: 1.45;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Тестовая 111страница</h1>
    <p>Если вы это видите, значит HTML работает корректно.</p>
    <button id="testBtn" type="button">Нажми меня</button>
  </main>

  <script>
    document.getElementById("testBtn").addEventListener("click", function () {
      alert("Готово! JavaScript тоже работает.");
    });
  </script>
</body>
</html>
