# Пример виртуального хоста для bot-1c.ru
# Скопируйте в /etc/nginx/sites-available/bot-1c.ru.conf и сделайте symlink в sites-enabled,
# либо подключите директивой include из конфигурации панели (аккуратно с дублированием server {}).

upstream portal_uvicorn {
    server 127.0.0.1:8000;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name bot-1c.ru www.bot-1c.ru;

    # После certbot сюда добавятся listen 443 ssl и пути к сертификатам.

    root /var/www/www-root/data/www/bot-1c.ru;
    index index.html;

    location /api/ {
        proxy_pass http://portal_uvicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
