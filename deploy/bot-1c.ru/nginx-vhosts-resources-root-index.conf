# Опционально: если главная https://bot-1c.ru/ уходит на :8080, а фронт лежит в
# /var/www/www-root/data/www/bot-1c.ru — сохраните как, например:
#   /etc/nginx/vhosts-resources/bot-1c.ru/spa-root.conf
#
# Точное совпадение URI "/" имеет приоритет над общим location / — отдаётся index.html с диска.
# Статика /assets/*.js из Vite уже может подхватываться вашими правилами с try_files $uri.

location = / {
	root /var/www/www-root/data/www/bot-1c.ru;
	try_files /index.html =404;
}
