# Положить на сервер как один из файлов в каталоге include панели:
#   /etc/nginx/vhosts-resources/bot-1c.ru/api-proxy.conf
# (имя произвольное, расширение .conf; каталог уже подключён в vhost.)
#
# После добавления: nginx -t && systemctl reload nginx

# FastAPI (uvicorn на 127.0.0.1:8000). Префикс ^~ чтобы перехватывать до общего location /
location ^~ /api/ {
	proxy_pass http://127.0.0.1:8000;
	proxy_http_version 1.1;
	proxy_set_header Host $host;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_read_timeout 120s;
}
